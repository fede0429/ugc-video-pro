name: studio-regression

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi

      - name: Install Playwright deps
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run regression bundle
        run: |
          python scripts/run_studio_regression.py --with-e2e --e2e-mock 1

      - name: Build dashboard data
        run: |
          python scripts/generate_test_dashboard_data.py

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: studio-regression-artifacts
          path: |
            STUDIO_REGRESSION_REPORT_V24.json
            UNIFIED_TEST_RUN_REPORT.json
            V23_E2E_BUTTON_AUDIT.json
            static/data/studio_test_dashboard.json
