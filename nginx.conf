# ============================================================
# UGC Video Pro - Nginx Reverse Proxy Configuration
# ============================================================
# Replace "your-domain.com" with your actual domain name.
#
# Features:
#   - HTTP → HTTPS redirect (with ACME challenge exception)
#   - SSL/TLS termination with Let's Encrypt certificates
#   - Proxy pass to FastAPI app on port 8000
#   - WebSocket upgrade support for /api/ws/ endpoints
#   - Gzip compression for text responses
#   - Security headers (HSTS, X-Frame-Options, etc.)
#   - Large upload support (100 MB for image uploads)
#   - Static file caching headers
# ============================================================


# ── HTTP — Redirect all traffic to HTTPS ─────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    # Let certbot complete ACME HTTP-01 challenges without redirect
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}


# ── HTTPS — Main server block ─────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name your-domain.com www.your-domain.com;

    # ── SSL certificates (managed by certbot) ──────────────────
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Modern TLS settings (Mozilla Intermediate compatibility)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ───────────────────────────────────────
    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Stop browsers from MIME-sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Enable XSS filtering in older browsers
    add_header X-XSS-Protection "1; mode=block" always;
    # Enforce HTTPS for 1 year (uncomment after verifying SSL works)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Control referrer information
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── General settings ───────────────────────────────────────
    # Allow large image/video uploads (100 MB)
    client_max_body_size 100M;
    client_body_timeout  120s;

    # ── Gzip compression ───────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;

    # ── WebSocket — Real-time progress updates ─────────────────
    # Must come before the general /api/ location block
    location /api/ws/ {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;

        # WebSocket upgrade handshake
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for WebSocket connections
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── API — FastAPI endpoints ────────────────────────────────
    location /api/ {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;

        # Forward client information to the FastAPI app
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep connections alive for better performance
        proxy_set_header Connection "";

        # Timeouts for long-running requests (video generation)
        proxy_connect_timeout 60s;
        proxy_read_timeout    600s;  # 10 min — video generation can take time
        proxy_send_timeout    120s;

        # Pass through large upload bodies without buffering
        proxy_request_buffering off;
    }

    # ── Static files — Frontend HTML/JS/CSS ───────────────────
    location / {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static assets aggressively (browser-side)
        # FastAPI adds cache headers — nginx respects them
        proxy_cache_bypass $http_pragma $http_authorization;

        proxy_connect_timeout 30s;
        proxy_read_timeout    30s;
    }

    # ── Logging ────────────────────────────────────────────────
    access_log /var/log/nginx/ugcvideo_access.log combined;
    error_log  /var/log/nginx/ugcvideo_error.log warn;
}
