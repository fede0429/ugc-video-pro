# ============================================================
# UGC Video Pro - Production Docker Compose
# ============================================================
# Runs app + db only (no internal nginx/certbot).
# Use host-level Nginx for SSL termination and reverse proxy.
#
# Usage:
#   1. cp .env.example .env && nano .env       # Fill secrets
#   2. cp config.example.yaml config.yaml      # Edit config
#   3. docker compose -f docker-compose.prod.yml up -d --build
#   4. docker compose -f docker-compose.prod.yml logs -f app
# ============================================================

services:

  # ── FastAPI Application ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ugc-video-pro:latest
    container_name: ugc-video-pro-app

    env_file:
      - .env

    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app

    ports:
      - "8001:8000"

    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ugc_data:/app/data

    depends_on:
      db:
        condition: service_healthy

    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s


  # ── PostgreSQL Database ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ugc-video-pro-db

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"

    volumes:
      - pgdata:/var/lib/postgresql/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"


volumes:
  pgdata:
    driver: local
  ugc_data:
    driver: local
